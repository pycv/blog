name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时运行一个部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 加载 Hugo 主题
          fetch-depth: 0         # 获取所有历史记录

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Verify build
        run: |
          # 检查是否有页面生成
          if [ -z "$(ls -A public/ 2>/dev/null)" ]; then
            echo "❌ Build failed: public/ is empty"
            exit 1
          fi
          # 统计生成的页面数
          page_count=$(find public -name "index.html" | wc -l)
          echo "✅ Build verified: $page_count pages generated"
          # 检查关键目录
          for dir in posts excerpts; do
            if [ -d "public/$dir" ]; then
              count=$(find "public/$dir" -name "index.html" | wc -l)
              echo "  - $dir: $count pages"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
