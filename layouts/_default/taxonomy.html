{{ define "main" }}
<div class="taxonomy-page">
    <header class="taxonomy-page__header">
        <a href="{{ "tags/" | relURL }}" class="taxonomy-page__back">
            <i class="fas fa-arrow-left"></i> 所有标签
        </a>
        <h1 class="taxonomy-page__title">
            <i class="fas fa-tag"></i>
            {{ .Title }}
        </h1>
        <p class="taxonomy-page__count">{{ len .Pages }} 篇文章</p>
    </header>
    
    <div class="taxonomy-page__list">
        {{ range .Pages }}
        <article class="taxonomy-article">
            <div class="taxonomy-article__content">
                <h2 class="taxonomy-article__title">
                    <a href="{{ .Permalink }}">{{ .Title }}</a </h2>
                <p class="taxonomy-article__excerpt">{{ .Summary | truncate 150 }}</p>
                <div class="taxonomy-article__meta">
                    <time datetime="{{ .Date.Format "2006-01-02" }}">
                        <i class="fas fa-calendar"></i>
                        {{ .Date.Format "2006-01-02" }}
                    </time>
                    <span class="taxonomy-article__reading-time">
                        <i class="fas fa-clock"></i>
                        {{ .ReadingTime }} 分钟
                    </span>
                </div>
            </div>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
