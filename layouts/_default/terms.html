{{ define "main" }}
<div class="tags-page">
    <h1 class="tags-title">{{ .Title | default "标签" }}</h1>
    {{ with .Description }}
    <p class="tags-desc">{{ . }}</p>
    {{ end }}
    
    <div class="tags-cloud">
        {{ range .Pages }}
        {{ $count := len .Pages }}
        <a href="{{ .Permalink }}" class="tag-link" data-count="{{ $count }}">
            {{ .Title }}<span class="tag-num">{{ $count }}</span>
        </a>
        {{ end }}
    </div>
</div>

<style>
.tags-page {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
}

.tags-title {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--card-text-color-main);
}

.tags-desc {
    color: var(--card-text-color-secondary);
    margin-bottom: 40px;
}

.tags-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    line-height: 1.8;
}

.tag-link {
    display: inline-block;
    padding: 4px 12px;
    color: var(--card-text-color-main);
    text-decoration: none;
    border-radius: 4px;
    font-size: 0.95rem;
    transition: background 0.15s, color 0.15s;
}

.tag-link:hover {
    background: var(--accent-color);
    color: #fff;
}

.tag-num {
    font-size: 0.75rem;
    opacity: 0.5;
    margin-left: 4px;
}

/* 根据数量调整字重 */
.tag-link[data-count="1"] { font-weight: 400; }
.tag-link[data-count="2"] { font-weight: 500; }
.tag-link[data-count="3"] { font-weight: 500; }
.tag-link[data-count="4"] { font-weight: 600; }
.tag-link[data-count="5"] { font-weight: 600; }
.tag-link[data-count="6"] { font-weight: 700; }
.tag-link[data-count="7"] { font-weight: 700; }
.tag-link[data-count="8"] { font-weight: 700; }
.tag-link[data-count="9"] { font-weight: 800; }
</style>
{{ end }}

{{ define "right-sidebar" }}
{{ end }}
