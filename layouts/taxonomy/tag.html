{{ define "main" }}
{{ $pages := where (eq .Params.tags .Name) }}
    <div class="tag-page">
        <div class="tag-page__header">
            <h1 class="tag-page__title">
                <i class="fas fa-tag"></i>
                标签： {{ .Params.tags }}
            </h1>
            <span class="tag-page__count">{{ len $pages }} 篇文章</span>
        </div>
        <div class="tag-page__list">
            {{ range $pages }}
            {{ $post := .Permalink }}
            <article class="tag-page__article">
                <a href="{{ $post }}" class="tag-page__article-title">{{ .Title }}</a>
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
            </article>
            {{ end }}
        </div>
    </div>
{{ end }}
